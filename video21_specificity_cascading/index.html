<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        .yellow{
            color: yellow;
        }
        .cred{
            color: red ;
        }
        .cpurple{
            color: purple ;
        }
        h1{
            color: aqua !important ;
        }
        /* this id example of attribute selector */
        [data-x=a]{
          background-color:  maroon;
        }

    </style>
</head>
<body>
    <div>
        <h1 class="yellow cred cpurple" data-x="a">CSS specificity</h1>

    </div>
</body>
</html>
