<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms - Lets learn it</title>
</head>

<body>
    <h1>form to apply for sigma web development course - TA</h1>
    <form action="post">
        <div>
            <label for="username">Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" pattern="[a-zA-Z0-9]+" autofocus>
        </div>

        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">female</label>
        </div>

        <div>
            <input type="checkbox" name="subscribe" id="subscribe" value="yes">
            <label for="subscribe">Subscribe To Newslatter</label>
        </div>

        <div>
            <label for="comment">Enter your comment....</label>
            <br>
            <textarea name="comment" id="comment" rows="7" cols="55" placeholder=" comment"></textarea>
        </div>

        <div>
            <select name="selectionfruit"  >
                <option value="apple">apple</option>
                <option value="banana">banana</option>
                <option value="cherry">cherry</option>

            </select>
            
        </div>
    </form>
</body>

</html>
