<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Position</title>
    <style>
        /* * {
            padding: 0;
            margin: 0;

        } */

        .box {
            justify-content: center;
            align-items: center;
            display: flex;
            margin: 150px;
            padding: 35px;
           
            width: 40vw;
            height: 100px;
            border: 3px solid;
            /* background-color: aqua; */

        }

        .box1 {

            position: absolute;
            top: 20px;
            left: 20px;

            background-color: aqua;

        }

        .box2 {
            position: sticky;
            top: 30px;
            margin: 0;
            

            /* position: relative;

            top: 99px;
            left: 78px;
            z-index: 1 ; */
            background-color: blue;
        }

        .box3 {
            position: fixed;
            bottom: 10px;
            left: 23px; 
            /* position: fixed;
            bottom: 0px;
            left: 15vw;
            height: 111px; */
            background-color: brown;
        }

        .box4 {
            /* position: absolute;
            top: 0px;
            left: 0px; */
            background-color: blueviolet;
        }

        .parent {
            padding: 43px;
            margin: 40px;
            border: 3px solid black;
            /* position: absolute; */
            /* transform , filter, or persepctive ke sath bhi ye apply ho jayega */
/* transform: translate(0); */
/* filter: invert(0); */
        }
    </style>
</head>

<body>
    <div class="parent">


        <div class="box box1">Box1</div>
        <div class="box box2">box2 sticky</div>
        <div class="box box3">box3 fixed</div>
        <div class="box box4">box4</div>
        <div class="box circle"></div>
        <div class="box box5"></div>
    </div>

</body>

</html>
