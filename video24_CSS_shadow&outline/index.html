<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            border: 2px dashed black;
            margin: 30px;
            padding: 20px;
            width: 900px;
            box-sizing: border-box;
            /* box-shadow: -5px -5px 34px 5px #888888; */
            /* box-shadow:inset 5px 5px 15px 5px #888888; */
            box-shadow: 5px 5px 15px 5px #e00c0c;
        }

        .text-element {
            /* text-shadow: -5px -2px 2px #ff0606;  */
            /* text-shadow: 2px 2px 4px #160a01; */
                text-shadow: -20px 8px 4px #fb7107;
                border: 2px dashed yellow;
    border-radius: 63px;
    /* outline */
    outline-offset: 26px;
    outline: 2px solid green;
        }
    </style>
</head>

<body>
    <div class="box">
        I am a box
    </div>
    <p class="text-element">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Nulla ex doloribus ducimus consequuntur laudantium?
        Fugiat alias sunt dolore mollitia! Nobis voluptatibus officia vitae neque accusantium fugit sunt sequi, quas
        reiciendis, omnis mollitia deleniti ratione ab.
    </p>
</body>

</html>
